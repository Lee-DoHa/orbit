AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ORBIT Backend - Emotion Structuring App

Parameters:
  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: RDS master password
  OpenAIApiKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: OpenAI API key (leave empty for mock Mirror Engine)
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: Anthropic API key (leave empty for mock AI insights)
  StripeSecretKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: Stripe secret key (leave empty for mock checkout)
  StripeWebhookSecret:
    Type: String
    NoEcho: true
    Default: ''
    Description: Stripe webhook signing secret
  RevenueCatWebhookSecret:
    Type: String
    NoEcho: true
    Default: ''
    Description: RevenueCat webhook authorization secret

Globals:
  Function:
    Runtime: nodejs20.x
    MemorySize: 256
    Timeout: 30
    Environment:
      Variables:
        DB_HOST: !GetAtt OrbitDB.Endpoint.Address
        DB_PORT: !GetAtt OrbitDB.Endpoint.Port
        DB_NAME: orbit
        DB_USER: orbit_admin
        DB_PASSWORD: !Ref DBPassword

Resources:
  # --- Security Group ---
  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow PostgreSQL access for ORBIT
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 0.0.0.0/0

  # --- RDS PostgreSQL ---
  OrbitDB:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: orbit-db
      Engine: postgres
      EngineVersion: '16.12'
      DBInstanceClass: db.t3.micro
      AllocatedStorage: 20
      DBName: orbit
      MasterUsername: orbit_admin
      MasterUserPassword: !Ref DBPassword
      PubliclyAccessible: true
      VPCSecurityGroups:
        - !GetAtt DBSecurityGroup.GroupId
      BackupRetentionPeriod: 7
      StorageType: gp2
      Tags:
        - Key: Project
          Value: orbit

  # --- Cognito ---
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: orbit-users
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireUppercase: false
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          Required: true
          Mutable: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: orbit-app
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH

  # --- Shared Lambda Layer ---
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: orbit-shared
      ContentUri: layers/shared/
      CompatibleRuntimes:
        - nodejs20.x

  # --- API Gateway ---
  OrbitApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      GatewayResponses:
        UNAUTHORIZED:
          StatusCode: 401
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
          ResponseTemplates:
            application/json: '{"message":"Unauthorized"}'
        ACCESS_DENIED:
          StatusCode: 403
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
          ResponseTemplates:
            application/json: '{"message":"Access Denied"}'
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt UserPool.Arn

  # --- Lambda Functions ---
  EntriesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: orbit-entries
      Handler: index.handler
      CodeUri: functions/entries/
      Layers:
        - !Ref SharedLayer
      Events:
        ListEntries:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /entries
            Method: GET
        CreateEntry:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /entries
            Method: POST
        GetEntry:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /entries/{id}
            Method: GET
        DeleteEntry:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /entries/{id}
            Method: DELETE
        UpdateEntry:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /entries/{id}
            Method: PUT

  MirrorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: orbit-mirror
      Handler: index.handler
      CodeUri: functions/mirror/
      Timeout: 60
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          OPENAI_API_KEY: !Ref OpenAIApiKey
      Events:
        Analyze:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /mirror
            Method: POST
        MirrorUsage:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /mirror/usage
            Method: GET
        MirrorFeedback:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /mirror/feedback
            Method: POST

  InsightsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: orbit-insights
      Handler: index.handler
      CodeUri: functions/insights/
      Layers:
        - !Ref SharedLayer
      Events:
        Weekly:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /insights/weekly
            Method: GET
        Patterns:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /insights/patterns
            Method: GET

  UsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: orbit-users
      Handler: index.handler
      CodeUri: functions/users/
      Layers:
        - !Ref SharedLayer
      Events:
        GetMe:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /users/me
            Method: GET
        UpdateMe:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /users/me
            Method: PUT
        DeleteMe:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /users/me
            Method: DELETE

  GrowthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: orbit-growth
      Handler: index.handler
      CodeUri: functions/growth/
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
      Events:
        GetExperiment:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /growth/experiment
            Method: GET
        PostExperiment:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /growth/experiment
            Method: POST
        GetSmartExperiment:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /growth/smart-experiment
            Method: GET
        GetReflection:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /growth/reflection
            Method: GET
        PostReflection:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /growth/reflection
            Method: POST

  StripeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: orbit-stripe
      Handler: index.handler
      CodeUri: functions/stripe/
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
      Events:
        CheckoutSession:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /stripe/checkout-session
            Method: POST
        PortalSession:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /stripe/portal-session
            Method: GET

  WebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: orbit-webhooks
      Handler: index.handler
      CodeUri: functions/webhooks/
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
          REVENUECAT_WEBHOOK_SECRET: !Ref RevenueCatWebhookSecret
      Events:
        StripeWebhook:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /webhooks/stripe
            Method: POST
            Auth:
              Authorizer: NONE
        RevenueCatWebhook:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /webhooks/revenuecat
            Method: POST
            Auth:
              Authorizer: NONE

  AIInsightsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: orbit-ai-insights
      Handler: index.handler
      CodeUri: functions/ai-insights/
      Timeout: 60
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
      Events:
        WeeklySummary:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /ai-insights/weekly-summary
            Method: GET
        PatternExplanations:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /ai-insights/pattern-explanations
            Method: GET
        MonthlyNarrative:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /ai-insights/monthly-narrative
            Method: GET

  SeedFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: orbit-seed
      Handler: index.handler
      CodeUri: functions/seed/
      Timeout: 60
      Layers:
        - !Ref SharedLayer
      Events:
        Seed:
          Type: Api
          Properties:
            RestApiId: !Ref OrbitApi
            Path: /admin/seed
            Method: POST
            Auth:
              Authorizer: NONE

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${OrbitApi}.execute-api.${AWS::Region}.amazonaws.com/Prod'
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient
  DBEndpoint:
    Description: RDS endpoint
    Value: !GetAtt OrbitDB.Endpoint.Address
